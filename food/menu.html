<!DOCTYPE html>
<html>
<head>
  <title>Menu</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-danger px-3">
  <a class="navbar-brand">Menu</a>
  <a class="btn btn-dark btn-sm" href="cart.html">Cart</a>
</nav>

<div class="container my-3">
  <button class="btn btn-outline-danger filter" data-filter="all">All</button>
  <button class="btn btn-outline-danger filter" data-filter="pizza">Pizza</button>
  <button class="btn btn-outline-danger filter" data-filter="burger">Burger</button>
</div>

<div class="container">
  <div class="row g-4">

    <div class="col-md-4 food-item pizza">
      <div class="card">
        <img src="images/food1.jpg">
        <div class="card-body">
          <h5>Cheese Pizza</h5>
          <button class="btn btn-danger add-to-cart" data-name="Cheese Pizza" data-price="299">Add ₹299</button>
        </div>
      </div>
    </div>

    <div class="col-md-4 food-item burger">
      <div class="card">
        <img src="images/food2.jpg">
        <div class="card-body">
          <h5>Veg Burger</h5>
          <button class="btn btn-danger add-to-cart" data-name="Veg Burger" data-price="149">Add ₹149</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
