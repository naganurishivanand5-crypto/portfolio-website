<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container my-5">
  <h2>Checkout</h2>

  <input class="form-control my-2" placeholder="Full Name">
  <input class="form-control my-2" placeholder="Address">
  <input class="form-control my-2" placeholder="Phone Number">

  <select class="form-control my-2">
    <option>Cash on Delivery</option>
    <option>UPI Payment</option>
  </select>

  <button class="btn btn-danger w-100">Place Order</button>
</div>

</body>
</html>
