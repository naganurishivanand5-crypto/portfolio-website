<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

  <!-- Navbar -->
  <header>

    <nav>

      <div class="logo">NETFLIX</div>

      <div class="nav-buttons">

        <button class="sign-btn" onclick="openPopup()">Sign In</button>

      </div>

    </nav>

  </header>

  <!-- Hero Section -->
  <section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

      <h1>Unlimited movies, TV shows and more</h1>

      <h3>Watch anywhere. Cancel anytime.</h3>

      <p>Ready to watch? Enter your email to create or restart your membership.</p>

      <div class="email-box">

        <input type="email" placeholder="Email address">

        <button onclick="showMessage()">Get Started ></button>

      </div>

    </div>

  </section>

  <!-- Movie Rows -->
  <section class="movies">

    <h2>Trending Now</h2>

    <div class="movie-row">

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?1">
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?2">
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?3">
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?4">
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?5">
      </div>

    </div>

  </section>

  <section class="movies">

    <h2>Popular on Netflix</h2>

    <div class="movie-row">

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?6">
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?7">
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?8">
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?9">
      </div>

      <div class="movie-card">
        <img src="https://picsum.photos/200/300?10">
      </div>

    </div>

  </section>

  <!-- Footer -->
  <footer>

    <p>Netflix Clone UI © 2026</p>

  </footer>

  <!-- Login Popup -->
<div class="popup" id="popup">

  <div class="popup-content">

    <span class="close-btn" onclick="closePopup()">&times;</span>

    <h2>Sign In</h2>

    <input type="email" placeholder="Enter Email">

    <input type="password" placeholder="Enter Password">

    <button class="login-btn">Login</button>

    <p class="register-text">
      New to Netflix?
      <a href="#">Register Now</a>
    </p>

  </div>

</div>

  <script src="script.js"></script>

</body>
</html>
